<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">

  <!-- DOME TIP -->
  <rect x="7" y="1" width="2" height="1" fill="#3ecfbd"/>

  <!-- DOME ROW 2 — teal outer, gold cockpit window -->
  <rect x="5" y="2" width="6" height="1" fill="#3ecfbd"/>
  <rect x="6" y="2" width="4" height="1" fill="#f0c040"/>

  <!-- DOME BASE ROW 3 — teal outer, gold cockpit window -->
  <rect x="4" y="3" width="8" height="1" fill="#3ecfbd"/>
  <rect x="6" y="3" width="4" height="1" fill="#f0c040"/>

  <!-- SAUCER — three rows, widest in the middle -->
  <rect x="2" y="4" width="12" height="1" fill="#3ecfbd"/>
  <rect x="0" y="5" width="16" height="1" fill="#2ab5a5"/>
  <rect x="2" y="6" width="12" height="1" fill="#1a9e8e"/>

  <!-- UNDERBELLY -->
  <rect x="3" y="7" width="10" height="1" fill="#0e6b5e"/>

  <!-- LIGHTS — three gold dots on underbelly -->
  <rect x="4"  y="7" width="2" height="1" fill="#f0c040"/>
  <rect x="7"  y="7" width="2" height="1" fill="#f0c040"/>
  <rect x="10" y="7" width="2" height="1" fill="#f0c040"/>

  <!-- TRACTOR BEAM — faint gold glow below -->
  <rect x="6" y="8"  width="4" height="1" fill="#f0c040" opacity="0.45"/>
  <rect x="5" y="9"  width="6" height="1" fill="#f0c040" opacity="0.28"/>
  <rect x="4" y="10" width="8" height="1" fill="#f0c040" opacity="0.14"/>

</svg>
